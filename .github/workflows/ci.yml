name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Build web package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout AbstractUIC shared packages
        run: git clone --depth 1 https://github.com/lpalbou/AbstractUIC.git ../abstractuic
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
