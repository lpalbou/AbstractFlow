name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout AbstractUIC shared packages
        run: git clone --depth 1 https://github.com/lpalbou/AbstractUIC.git ../abstractuic
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install "abstractgateway>=0.2.22"
          python -m pip install pytest pytest-asyncio
      - name: Pytest
        env:
          ABSTRACTFLOW_TEST_LLM_PROVIDER: "disabled"
        run: python -m pytest

  build:
    name: Build Python distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build
        run: |
          python -m pip install -U pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[docs]"
      - name: MkDocs build
        run: mkdocs build -q

  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout AbstractUIC shared packages
        run: git clone --depth 1 https://github.com/lpalbou/AbstractUIC.git ../abstractuic
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Install
        working-directory: web/frontend
        run: npm ci
      - name: Build
        working-directory: web/frontend
        run: npm run build
