name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, with or without the leading v (example: 0.3.7)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout AbstractUIC shared packages
        run: git clone --depth 1 https://github.com/lpalbou/AbstractUIC.git ../abstractuic
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[apple]"
          python -m pip install pytest pytest-asyncio
      - name: Pytest
        env:
          ABSTRACTFLOW_TEST_LLM_PROVIDER: "disabled"
        run: python -m pytest

  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout AbstractUIC shared packages
        run: git clone --depth 1 https://github.com/lpalbou/AbstractUIC.git ../abstractuic
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Install
        working-directory: web/frontend
        run: npm ci
      - name: Build
        working-directory: web/frontend
        run: npm run build

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[docs]"
      - name: MkDocs build
        run: mkdocs build -q

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [test, frontend, docs]
    outputs:
      version: ${{ steps.release-meta.outputs.version }}
      tag: ${{ steps.release-meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: |
          python -m pip install -U pip
          python -m pip install build twine
      - name: Validate tag, version, and changelog
        id: release-meta
        env:
          RELEASE_INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version_input = os.environ.get("RELEASE_INPUT_VERSION", "").strip()
          ref_name = os.environ["GITHUB_REF_NAME"].strip()
          raw_version = version_input or ref_name
          version = raw_version[1:] if raw_version.startswith("v") else raw_version
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:[a-zA-Z0-9.-]+)?", version):
              raise SystemExit(f"Invalid release version: {raw_version!r}")
          tag = f"v{version}"

          version_text = Path("abstractflow/_version.py").read_text()
          version_match = re.search(r'__version__\s*=\s*"([^"]+)"', version_text)
          if not version_match:
              raise SystemExit("Could not find __version__ in abstractflow/_version.py")
          package_version = version_match.group(1)
          if version != package_version:
              raise SystemExit(
                  f"Tag version {version!r} does not match package version {package_version!r}"
              )

          changelog = Path("CHANGELOG.md").read_text()
          header = re.search(rf"^## \[{re.escape(version)}\] - .+$", changelog, re.MULTILINE)
          if not header:
              raise SystemExit(f"CHANGELOG.md has no entry for {version}")

          rest = changelog[header.end():]
          next_header = re.search(r"^## \[", rest, re.MULTILINE)
          notes = rest[: next_header.start() if next_header else len(rest)].strip()
          if not notes:
              raise SystemExit(f"CHANGELOG.md entry for {version} is empty")

          Path("release-notes.md").write_text(notes + "\n")
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              print(f"version={version}", file=fh)
              print(f"tag={tag}", file=fh)
          PY
      - name: Build
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  ensure-tag:
    name: Ensure release tag
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create annotated tag for manual releases
        if: github.event_name == 'workflow_dispatch'
        run: |
          tag="${{ needs.build.outputs.tag }}"
          if git show-ref --verify --quiet "refs/tags/${tag}"; then
            remote_sha="$(git rev-parse "refs/tags/${tag}^{}" 2>/dev/null || git rev-parse "refs/tags/${tag}")"
            local_sha="$(git rev-parse HEAD)"
            if [ "${remote_sha}" != "${local_sha}" ]; then
              echo "Tag ${tag} already exists and points to ${remote_sha}, but current commit is ${local_sha}."
              echo "Delete/recreate the tag (or bump version) to release this commit."
              exit 1
            fi
            echo "Tag ${tag} already exists on origin for the same commit. Reusing it."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "AbstractFlow ${tag}"
          git push origin "${tag}"
      - name: Tag already supplied by push trigger
        if: github.event_name != 'workflow_dispatch'
        run: echo "Using existing tag ${{ needs.build.outputs.tag }}"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, ensure-tag]
    environment:
      name: pypi
      url: https://pypi.org/project/abstractflow/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-npm:
    name: Publish frontend to npm
    runs-on: ubuntu-latest
    needs: [build, ensure-tag]
    environment:
      name: npm
      url: https://www.npmjs.com/package/@abstractframework/flow
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Checkout AbstractUIC shared packages
        run: git clone --depth 1 https://github.com/lpalbou/AbstractUIC.git ../abstractuic
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - name: Install and version frontend package
        working-directory: web/frontend
        run: |
          npm ci
          node -e "const fs=require('fs'); const p='package.json'; const o=JSON.parse(fs.readFileSync(p,'utf8')); o.version='${{ needs.build.outputs.version }}'; fs.writeFileSync(p, JSON.stringify(o, null, 2) + '\\n');"
      - name: Publish
        working-directory: web/frontend
        run: |
          npm run build
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} is already published; skipping."
          else
            npm publish --access public --provenance
          fi

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, ensure-tag, publish-pypi, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: AbstractFlow ${{ needs.build.outputs.tag }}
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true

  deploy-docs:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, github-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install docs dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[docs]"
      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Deploy MkDocs site
        run: mkdocs gh-deploy --force --clean --message "Deploy docs for ${{ needs.build.outputs.tag }}"
