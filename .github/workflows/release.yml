name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, with or without leading v"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate npm package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-meta.outputs.version }}
      tag: ${{ steps.release-meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Checkout AbstractUIC shared packages
        run: git clone --depth 1 https://github.com/lpalbou/AbstractUIC.git ../abstractuic
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Validate tag, package version, and changelog
        id: release-meta
        env:
          RELEASE_INPUT_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const versionInput = process.env.RELEASE_INPUT_VERSION || '';
          const refName = process.env.GITHUB_REF_NAME || '';
          const rawVersion = versionInput || refName;
          const version = rawVersion.startsWith('v') ? rawVersion.slice(1) : rawVersion;
          if (!/^\d+\.\d+\.\d+(?:[a-zA-Z0-9.-]+)?$/.test(version)) {
            throw new Error(`Invalid release version: ${rawVersion}`);
          }
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.version !== version) {
            throw new Error(`Tag version ${version} does not match package version ${pkg.version}`);
          }
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          if (!changelog.includes(`## [${version}] - `)) {
            throw new Error(`CHANGELOG.md has no entry for ${version}`);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=v${version}\n`);
          NODE
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Pack
        run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: npm-pack
          path: "*.tgz"

  ensure-tag:
    name: Ensure release tag
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create annotated tag for manual releases
        if: github.event_name == 'workflow_dispatch'
        run: |
          tag="${{ needs.build.outputs.tag }}"
          if git show-ref --verify --quiet "refs/tags/${tag}"; then
            remote_sha="$(git rev-parse "refs/tags/${tag}^{}" 2>/dev/null || git rev-parse "refs/tags/${tag}")"
            local_sha="$(git rev-parse HEAD)"
            if [ "${remote_sha}" != "${local_sha}" ]; then
              echo "Tag ${tag} already exists and points to ${remote_sha}, but current commit is ${local_sha}."
              exit 1
            fi
            echo "Tag ${tag} already exists on origin for the same commit. Reusing it."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "AbstractFlow ${tag}"
          git push origin "${tag}"
      - name: Tag already supplied by push trigger
        if: github.event_name != 'workflow_dispatch'
        run: echo "Using existing tag ${{ needs.build.outputs.tag }}"

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build, ensure-tag]
    environment:
      name: npm
      url: https://www.npmjs.com/package/@abstractframework/flow
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Checkout AbstractUIC shared packages
        run: git clone --depth 1 https://github.com/lpalbou/AbstractUIC.git ../abstractuic
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install and build
        run: |
          npm ci
          npm run build
      - name: Publish
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} is already published; skipping."
          else
            npm publish --access public --provenance
          fi

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, ensure-tag, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: npm-pack
          path: dist-release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: AbstractFlow ${{ needs.build.outputs.tag }}
          generate_release_notes: true
          files: dist-release/*
