site_name: AbstractFlow
site_description: Diagram-based, durable AI workflows for Python with portable VisualFlow JSON and a reference visual editor.
site_url: https://www.lpalbou.info/AbstractFlow/
repo_url: https://github.com/lpalbou/AbstractFlow
repo_name: lpalbou/AbstractFlow

docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - footnotes
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight

plugins:
  - search

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore
    unrecognized_links: ignore

nav:
  - Home: README.md
  - Getting Started: getting-started.md
  - API Reference: api.md
  - Architecture: architecture.md
  - VisualFlow JSON: visualflow.md
  - Web Editor: web-editor.md
  - CLI: cli.md
  - FAQ: faq.md
